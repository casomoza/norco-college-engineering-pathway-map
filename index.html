<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pre-Engineering Pathway — Norco College</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #faf9f7;
      color: #2a2a2a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .page { max-width: 1100px; margin: 0 auto; }

    /* ── Colors (Norco College Brand) ──────────────────────── */
    :root {
      /* Signature Colors */
      --claret:       #6b1f37;
      --burgundy:     #5c2d47;
      --mahogany:     #3d302d;
      
      /* Supporting Colors */
      --palomino:     #f7ad20;
      --champagne:    #c9a966;
      --rust:         #8b5a38;
      --manzanita:    #6b3d2b;
      --buckskin:     #a39e88;
      --sage:         #6b8675;
      --thistle:      #6b5d6e;
      --wood-grain:   #7a6b5a;
      --agave:        #5d7b86;
      --slate:        #3a4d54;
      --elderberry:   #1a1a1a;
      --del-mar:      #0c1e35;
      
      /* UI Colors */
      --bg-primary:   #ffffff;
      --bg-secondary: #f5f3f1;
      --border:       #e8ddd6;
      --border-strong:#d4ccc0;
      --text-primary: #2a2a2a;
      --text-secondary:#5d5d5d;
      --text-tertiary:#8a8a8a;
    }

    /* ── Header ───────────────────────────────────────────── */
    .page-header { margin-bottom: 1.5rem; }
    .college-label { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--claret); margin-bottom: 4px; }
    .program-title { font-size: 24px; font-weight: 700; color: var(--claret); margin-bottom: 4px; }
    .program-degree { font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; }
    .program-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 12px; max-width: 780px; }
    .outcome-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .outcome-tag { font-size: 12px; padding: 3px 11px; background: var(--bg-secondary); color: var(--burgundy); border-radius: 20px; border: 0.5px solid var(--burgundy); }

    /* ── Stats row ────────────────────────────────────────── */
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.25rem; }
    .stat-box { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 12px; }
    .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    .stat-value { font-size: 22px; font-weight: 600; color: var(--claret); }
    .stat-sub { font-size: 11px; font-weight: 400; color: var(--text-tertiary); }

    /* ── Legend ───────────────────────────────────────────── */
    .legend { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: .85rem; }
    .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
    .leg-bar { width: 3px; height: 15px; border-radius: 2px; }
    .leg-dash { width: 14px; height: 14px; border-radius: 3px; }

    /* ── Filter chips ─────────────────────────────────────── */
    .filter-row { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
    .filter-label { font-size: 12px; color: var(--text-tertiary); }
    .chip {
      font-family: inherit; font-size: 12px; padding: 5px 13px; border-radius: 20px;
      cursor: pointer; border: 0.5px solid var(--border-strong); background: transparent;
      color: var(--text-secondary); display: flex; align-items: center; gap: 6px;
      transition: all .12s;
    }
    .chip:hover { background: var(--bg-secondary); }
    .chip .cdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .chip.active { font-weight: 600; color: var(--claret); background: rgba(107, 31, 55, .08); border-color: var(--claret); }
    .chip.clear-btn { border-color: var(--border); color: var(--text-tertiary); }

    /* ── Year sections ────────────────────────────────────── */
    .yr-sec { margin-bottom: 1.25rem; }
    .yr-label { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; padding-left: 2px; }
    .sem-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }

    /* ── Semester columns ─────────────────────────────────── */
    .sem-col { border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--bg-primary); }
    .sem-hd { background: var(--bg-secondary); padding: 8px 10px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .sem-hd-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
    .sem-hd-units { font-size: 11px; color: var(--text-tertiary); }
    .sem-body { padding: 6px; display: flex; flex-direction: column; gap: 5px; }

    /* ── Course cards ─────────────────────────────────────── */
    .card { border-radius: 7px; padding: 8px 9px; cursor: pointer; transition: background .1s, opacity .15s; }

    .card.required { border: 0.5px solid var(--border); border-left-width: 3px; }
    .card.required:hover { background: var(--bg-secondary); }
    .card.required.selected { background: var(--bg-secondary); border-color: #9ca3af !important; }
    .card.required.dimmed { opacity: 0.12; pointer-events: none; }
    .card.core { border-left-color: var(--claret); }
    .card.ge   { border-left-color: var(--sage); }

    .card.conditional { border: 1.5px dashed var(--palomino); background: rgba(247, 173, 32, .04); }
    .card.conditional:hover { background: rgba(247, 173, 32, .1); }
    .card.conditional.selected { background: rgba(247, 173, 32, .13); }

    .card.optional-card { border: 1.5px dashed var(--border-strong); background: transparent; }
    .card.optional-card:hover { background: var(--bg-secondary); }
    .card.optional-card.selected { background: var(--bg-secondary); }

    .c-code  { font-size: 10px; font-weight: 700; letter-spacing: .05em; color: var(--text-tertiary); margin-bottom: 2px; }
    .c-title { font-size: 12px; font-weight: 500; color: var(--text-primary); line-height: 1.35; margin-bottom: 5px; }
    .c-bottom{ display: flex; justify-content: space-between; align-items: center; }
    .c-units { font-size: 11px; color: var(--text-secondary); }
    .c-dots  { display: flex; gap: 3px; align-items: center; }
    .c-dot   { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── GE Dropdown ───────────────────────────────────────── */
    .ge-dropdown-wrapper { margin-top: 6px; }
    .ge-dropdown {
      font-family: inherit; font-size: 11px; width: 100%; padding: 4px 6px;
      border: 0.5px solid var(--sage); border-radius: 4px; background: rgba(107, 134, 117, .05);
      color: var(--text-primary); cursor: pointer;
    }
    .ge-dropdown:hover { background: rgba(107, 134, 117, .1); }

    .special-pill {
      font-size: 10px; font-weight: 600; letter-spacing: .03em;
      padding: 2px 7px; border-radius: 4px;
      display: inline-flex; align-items: center; gap: 3px; margin-bottom: 5px;
    }
    .pill-cond { background: rgba(247, 173, 32, .15); color: #92400e; border: 0.5px solid rgba(247, 173, 32, .4); }
    .pill-opt  { background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border-strong); }

    /* ── Detail panel ─────────────────────────────────────── */
    .detail-panel {
      margin-top: 14px; border: 0.5px solid var(--border-strong);
      border-radius: 12px; padding: 16px 20px; background: var(--bg-primary);
    }
    .detail-close {
      float: right; background: transparent; border: none; cursor: pointer;
      color: var(--text-tertiary); font-size: 18px; line-height: 1; padding: 2px;
    }
    .detail-close:hover { color: var(--text-primary); }
    .detail-meta { font-size: 11px; font-weight: 600; letter-spacing: .06em; color: var(--text-tertiary); margin-bottom: 4px; }
    .detail-title { font-size: 19px; font-weight: 700; color: var(--claret); margin-bottom: 12px; }
    .detail-desc { font-size: 13.5px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 16px; }
    .detail-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; border-top: 0.5px solid var(--border); padding-top: 14px; margin-bottom: 14px; }
    .detail-field label { font-size: 10.5px; color: var(--text-tertiary); display: block; margin-bottom: 3px; }
    .detail-field p { font-size: 13px; color: var(--text-primary); line-height: 1.4; }
    .detail-field .big { font-size: 17px; font-weight: 600; }
    .satisfies-label { font-size: 10.5px; color: var(--text-tertiary); margin-bottom: 7px; }
    .satisfies-badges { display: flex; gap: 7px; flex-wrap: wrap; }
    .req-badge { font-size: 11px; padding: 3px 10px; border-radius: 5px; border: 0.5px solid; display: inline-block; }
    .callout { border-radius: 8px; padding: 11px 13px; font-size: 12.5px; line-height: 1.65; margin-top: 12px; }
    .callout strong { display: block; margin-bottom: 3px; font-size: 13px; }
    .callout-amber { background: rgba(247, 173, 32, .1); border: 0.5px solid rgba(247, 173, 32, .45); color: #78350f; }
    .callout-gray  { background: var(--bg-secondary); border: 0.5px solid var(--border); color: var(--text-secondary); }

    /* ── Dot key footer ───────────────────────────────────── */
    .dot-key {
      display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
      margin-top: 12px; padding: 10px 14px;
      background: var(--bg-secondary); border-radius: 9px; border: 0.5px solid var(--border);
    }
    .dot-key-label { font-size: 11.5px; font-weight: 600; color: var(--text-secondary); }
    .dot-key-item  { display: flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--text-secondary); }
    .dot-key-dot   { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 800px) {
      .sem-grid { grid-template-columns: repeat(2,1fr); }
      .stats    { grid-template-columns: repeat(2,1fr); }
      .detail-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .sem-grid { grid-template-columns: 1fr; }
      .stats    { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="page" id="root"></div>

<script>
/* ════════════════════════════════════════════════════════════
   GE COURSE OPTIONS

/* ════════════════════════════════════════════════════════════

  { id:"su1", label:"Summer", year:1 },

/* ════════════════════════════════════════════════════════════
   APP STATE & HELPERS
   ════════════════════════════════════════════════════════════ */
let selectedCode = null;
let activeReq    = null;
let geSelections = {}; // Track selected GE courses: { "RCCD GE 3": "Art 6, 6H", ... }

const isSpecial   = c => c.cat === "conditional" || c.cat === "optional";
const semReqUnits = id => COURSES.filter(c => c.sem===id && !isSpecial(c)).reduce((s,c)=>s+c.units, 0);
const reqUnits    = key => COURSES.filter(c => c.satisfies.includes(key)).reduce((s,c)=>s+c.units, 0);

/* ════════════════════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════════════════════ */
function render() {
  const root = document.getElementById("root");
  root.innerHTML = "";

  // ── Program header ─────────────────────────────────────
  root.insertAdjacentHTML("beforeend", `
    <div class="page-header">
      <div class="college-label">Norco College &middot; Pathway Map</div>
      <h1 class="program-title">${PROGRAM.name}</h1>
      <p class="program-degree">${PROGRAM.degree} &nbsp;&middot;&nbsp; ${PROGRAM.totalUnits} units</p>
      <p class="program-desc">${PROGRAM.description}</p>
      <div class="outcome-tags">
        ${PROGRAM.outcomes.map(o=>`<span class="outcome-tag">${o}</span>`).join("")}
      </div>
    </div>`);

  // ── Stats ──────────────────────────────────────────────
  const statsEl = document.createElement("div");
  statsEl.className = "stats";
  statsEl.innerHTML = Object.entries(REQS).map(([k,r])=>`
    <div class="stat-box">
      <div class="stat-label"><span class="stat-dot" style="background:${r.dot}"></span>${r.label}</div>
      <div class="stat-value">${reqUnits(k)}<span class="stat-sub"> units</span></div>
    </div>`).join("");
  root.appendChild(statsEl);

  // ── Legend ─────────────────────────────────────────────
  const legendEl = document.createElement("div");
  legendEl.className = "legend";
  legendEl.innerHTML = `
    <div class="leg-item"><div class="leg-bar" style="background:#6b1f37"></div>Major / Engineering</div>
    <div class="leg-item"><div class="leg-bar" style="background:#6b8675"></div>General Education</div>
    <div class="leg-item"><div class="leg-dash" style="border:1.5px dashed #f7ad20"></div>Conditional (test-out available)</div>
    <div class="leg-item"><div class="leg-dash" style="border:1.5px dashed #d4ccc0"></div>Optional</div>`;
  root.appendChild(legendEl);

  // ── Filters ────────────────────────────────────────────
  const filterRow = document.createElement("div");
  filterRow.className = "filter-row";
  filterRow.innerHTML = `<span class="filter-label">Filter by requirement:</span>`;
  Object.entries(REQS).forEach(([k,r]) => {
    const btn = document.createElement("button");
    btn.className = "chip" + (activeReq===k?" active":"");
    btn.innerHTML = `<span class="cdot" style="background:${r.dot}"></span>${r.label}`;
    btn.onclick = () => { activeReq = activeReq===k ? null : k; render(); };
    filterRow.appendChild(btn);
  });
  if (activeReq) {
    const clr = document.createElement("button");
    clr.className = "chip clear-btn";
    clr.textContent = "✕ Clear filter";
    clr.onclick = () => { activeReq = null; render(); };
    filterRow.appendChild(clr);
  }
  root.appendChild(filterRow);

  // ── Year sections ──────────────────────────────────────
  [1, 2].forEach(yr => {
    const sec = document.createElement("div");
    sec.className = "yr-sec";
    sec.innerHTML = `<div class="yr-label">Year ${yr}</div>`;
    const grid = document.createElement("div");
    grid.className = "sem-grid";

    SEMESTERS.filter(s => s.year===yr).forEach(sem => {
      const semCourses = COURSES.filter(c => c.sem===sem.id);
      const reqU  = semReqUnits(sem.id);
      const hasOpt = semCourses.some(c => isSpecial(c));

      const col = document.createElement("div");
      col.className = "sem-col";
      col.innerHTML = `
        <div class="sem-hd">
          <span class="sem-hd-name">${sem.label}</span>
          <span class="sem-hd-units">${reqU>0 ? reqU+"u" : ""}${hasOpt&&reqU>0?" +opt":hasOpt?"optional":""}</span>
        </div>`;
      const body = document.createElement("div");
      body.className = "sem-body";

      semCourses.forEach(course => {
        const special = isSpecial(course);
        const dimmed  = activeReq && !special && !course.satisfies.includes(activeReq);
        const sel     = selectedCode === course.code;

        const card = document.createElement("div");
        let cls = "card ";
        if      (course.cat==="conditional") cls += "conditional";
        else if (course.cat==="optional")    cls += "optional-card";
        else                                  cls += "required " + course.cat;
        if (sel)    cls += " selected";
        if (dimmed) cls += " dimmed";
        card.className = cls;

        let pill = "";
        if (course.cat==="conditional") pill = `<div class="special-pill pill-cond">⚗ Test-out available</div>`;
        if (course.cat==="optional")    pill = `<div class="special-pill pill-opt">★ Optional</div>`;

        let dropdown = "";
        if (course.ge_area) {
          const options = GE_OPTIONS[course.ge_area];
          const currentSelection = geSelections[course.code] || "Select a course";
          dropdown = `
            <div class="ge-dropdown-wrapper">
              <select class="ge-dropdown" id="ge-${course.code}">
                <option value="">Select a course</option>
                ${options.map(opt => `<option value="${opt}" ${geSelections[course.code] === opt ? 'selected' : ''}>${opt}</option>`).join('')}
              </select>
            </div>`;
        }

        card.innerHTML = `
          <div class="c-code">${course.code}</div>
          <div class="c-title">${course.title}</div>
          ${pill}
          <div class="c-bottom">
            <span class="c-units">${course.units}u</span>
            <div class="c-dots">${course.satisfies.map(r=>`<div class="c-dot" style="background:${REQS[r].dot}" title="${REQS[r].label}"></div>`).join("")}</div>
          </div>
          ${dropdown}`;
        
        card.onclick = (e) => {
          // Don't select card if clicking dropdown
          if (e.target.classList.contains('ge-dropdown')) return;
          selectedCode = selectedCode===course.code ? null : course.code;
          render();
        };
        
        body.appendChild(card);

        // Attach dropdown listener after card is added
        setTimeout(() => {
          const select = document.getElementById(`ge-${course.code}`);
          if (select) {
            select.addEventListener('change', (e) => {
              if (e.target.value) {
                geSelections[course.code] = e.target.value;
              } else {
                delete geSelections[course.code];
              }
              render();
            });
          }
        }, 0);
      });

      col.appendChild(body);
      grid.appendChild(col);
    });

    sec.appendChild(grid);
    root.appendChild(sec);
  });

  // ── Detail panel ───────────────────────────────────────
  if (selectedCode) {
    const c   = COURSES.find(x => x.code===selectedCode);
    const sem = SEMESTERS.find(s => s.id===c.sem);
    const isC = c.cat==="conditional";
    const isO = c.cat==="optional";

    const badges = c.satisfies.length
      ? c.satisfies.map(k=>{const r=REQS[k];return `<span class="req-badge" style="background:${r.bg};color:${r.text};border-color:${r.border}">${r.label}</span>`;}).join("")
      : `<span style="font-size:12px;color:#9ca3af">No formal requirement — see note below</span>`;

    let callout = "";
    if (isC) callout = `<div class="callout callout-amber"><strong>⚗ Chemistry Placement Diagnostic Exam</strong>Students who pass the Chemistry Diagnostics Exam may skip CHE-2A and enroll directly in CHE-1A in the Fall. Students who do not pass the diagnostic can complete CHE-2A during Summer Year 1 to stay on track.</div>`;
    if (isO) callout = `<div class="callout callout-gray"><strong>★ Optional Course</strong>${c.note}</div>`;

    const panel = document.createElement("div");
    panel.className = "detail-panel";
    panel.innerHTML = `
      <button class="detail-close" id="dp-close" aria-label="Close">✕</button>
      <div class="detail-meta">${c.code} &nbsp;&middot;&nbsp; ${sem.label}, Year ${sem.year}</div>
      <h2 class="detail-title">${c.title}</h2>
      <p class="detail-desc">${c.desc}</p>
      <div class="detail-grid">
        <div class="detail-field"><label>Units</label><p class="big">${c.units}</p></div>
        <div class="detail-field"><label>Prerequisite</label><p>${c.prereq||"None"}</p></div>
        <div class="detail-field"><label>Type</label><p>${isC?"Conditional":isO?"Optional":c.cat==="core"?"Major / Engineering":"General Education"}</p></div>
      </div>
      <p class="satisfies-label">Satisfies</p>
      <div class="satisfies-badges">${badges}</div>
      ${callout}`;

    root.appendChild(panel);
    document.getElementById("dp-close").onclick = () => { selectedCode=null; render(); };
  }

  // ── Dot key footer ─────────────────────────────────────
  const dk = document.createElement("div");
  dk.className = "dot-key";
  dk.innerHTML = `<span class="dot-key-label">Colored dots =</span>` +
    Object.values(REQS).map(r=>`<span class="dot-key-item"><span class="dot-key-dot" style="background:${r.dot}"></span>${r.label}</span>`).join("");
  root.appendChild(dk);
}

render();
</script>
</body>
</html>
